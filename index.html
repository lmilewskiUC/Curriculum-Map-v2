<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Applied Data Science — Curriculum Map</title>
<style>
  /* Base Reset & Variables */
  :root {
    --primary: #1a1a1a;
    --accent: #7f77dd;
    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --border: #e0dfd8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--primary); padding: 2rem 1rem; line-height: 1.5; }

  /* Header & Toolbar */
  .page-header { max-width: 1100px; margin: 0 auto 2rem; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  
  .toolbar { max-width: 1100px; margin: 0 auto 2rem; display: flex; flex-direction: column; gap: 1rem; }
  
  /* Topic Search Styling */
  .search-container { position: relative; max-width: 500px; }
  .topic-select { 
    width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #d0cfc8; 
    appearance: none; background: #fff; font-size: 14px; cursor: pointer;
  }
  
  .active-topic-banner {
    display: none; align-items: center; gap: 10px; padding: 10px 15px; 
    background: var(--accent); color: white; border-radius: 8px; font-size: 13px; font-weight: 600;
  }
  .active-topic-banner.show { display: flex; }
  .clear-btn { background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 2px 8px; border-radius: 4px; font-size: 11px; }

  /* Grid & Cards */
  .semester-grid { max-width: 1100px; margin: 0 auto; }
  .semester-block { margin-bottom: 3rem; }
  .semester-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .semester-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; }
  .semester-line { flex: 1; height: 1px; background: #ddd; }
  
  .course-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
  
  .course-card { 
    background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; 
    transition: all 0.2s; position: relative; overflow: hidden; display: flex; flex-direction: column;
  }
  .course-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #ccc; }
  .course-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

  .course-code { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 4px; }
  .course-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; flex-grow: 1; }

  /* Clickable Topics */
  .topic-tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .topic-tag { 
    font-size: 10px; padding: 3px 8px; background: #eee; border-radius: 4px; 
    cursor: pointer; color: #555; font-weight: 600; transition: background 0.2s;
  }
  .topic-tag:hover { background: var(--accent); color: #fff; }

  /* Modal */
  .modal-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
    backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; 
  }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; width: 90%; max-width: 600px; border-radius: 16px; max-height: 85vh; overflow-y: auto; padding: 30px; }
  .modal-header { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
  .section-title { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; margin: 20px 0 10px; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Applied Data Science Map</h1>
  <p>Select a topic to find related courses across the curriculum.</p>
</div>

<div class="toolbar">
  <div class="search-container">
    <select id="globalTopicSelector" class="topic-select">
      <option value="">Search by preset topic...</option>
      </select>
  </div>

  <div id="activeFilterBanner" class="active-topic-banner">
    Showing courses with topic: <span id="currentTopicName"></span>
    <button class="clear-btn" onclick="clearTopicFilter()">Clear Filter</button>
  </div>
</div>

<div id="semesterGrid" class="semester-grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div id="modalContent"></div>
    <button onclick="closeModal()" style="margin-top: 20px; padding: 8px 16px; cursor: pointer;">Close</button>
  </div>
</div>

<script>
/** * 1. PRESET TOPIC LIST 
 * This ensures consistency across instructors.
 */
const TOPIC_REGISTRY = [
  "Python", "SQL", "Bayesian Statistics", "Machine Learning", 
  "Deep Learning", "Data Ethics", "Cloud Computing", "Visualization",
  "Feature Engineering", "Natural Language Processing", "Big Data", "Linear Algebra"
];

const CATEGORIES = {
  core: { label: 'Core', color: '#1d9e75' },
  elective: { label: 'Elective', color: '#378add' },
  capstone: { label: 'Capstone', color: '#ba7517' },
  seminar: { label: 'Career Seminar', color: '#7f77dd' }
};

const COURSES = [
  { 
    code: "ADSP 31012", name: "Data Engineering Platforms for Analytics", semester: "Spring Year 1", cat: "core",
    desc: `Data is at the heart of data science and AI, business intelligence, and advanced analytics as intelligent,data-driven applications and solutions have become the norm. Data engineering is an essential firststep in building a data-driven enterprise with competitive advantage in the market. Modern data andanalytics platforms reduce manual data preparation by automating data curation processes, churningand analyzing internet scale data from disparate sources and presenting contextual and actionableinformation. The self-service platform enables leadership to make informed business decisions bydeveloping impactful data-driven insights.Data stores for storing large contextual information is everywhere, even though we may not recognizethem in our everyday activities. They are hidden behind your online banking profile, airline reservationsystems, point of sale systems, medical records, and even employment records. Data is collected,ingested, curated, transformed and stored to include historical information, as well as new data isgathered as it is generated, enabling stakeholders to drive both strategic and tactical decision-makingprocesses. Benefits of storing data includes optimizing internal business processes, accelerating andimproving decision-making, increasing operational efficiency, driving new revenue to gain competitiveadvantage.Data Engineering Platforms for AnalyticsADSP 31012Spring 2026Tuesday from 6:00pm-9:00pm CSTMarch 30 – June 6, 2026Location: In person weekly - NBC downtown Chicago
.`,
    topics: ["", ""]
  },
  { 
    code: "ADS 502", name: "Programming for DS", semester: "Fall Year 1", cat: "core",
    desc: "Introduction to technical stack.",
    topics: ["Python", "SQL", "Feature Engineering"]
  },
  { 
    code: "ADS 511", name: "Advanced ML", semester: "Spring Year 1", cat: "elective",
    desc: "Complex modeling strategies.",
    topics: ["Machine Learning", "Python", "Deep Learning"]
  }
];

let activeTopic = "";

function init() {
  populateTopicSelector();
  renderGrid();
  
  // Handle Selector Change
  document.getElementById('globalTopicSelector').addEventListener('change', (e) => {
    filterByTopic(e.target.value);
  });
}

function populateTopicSelector() {
  const select = document.getElementById('globalTopicSelector');
  TOPIC_REGISTRY.sort().forEach(topic => {
    const opt = document.createElement('option');
    opt.value = topic;
    opt.textContent = topic;
    select.appendChild(opt);
  });
}

function filterByTopic(topic) {
  activeTopic = topic;
  const banner = document.getElementById('activeFilterBanner');
  const nameSpan = document.getElementById('currentTopicName');
  
  if (topic) {
    banner.classList.add('show');
    nameSpan.textContent = topic;
    document.getElementById('globalTopicSelector').value = topic;
  } else {
    banner.classList.remove('show');
    document.getElementById('globalTopicSelector').value = "";
  }
  renderGrid();
}

function clearTopicFilter() {
  filterByTopic("");
}

function renderGrid() {
  const grid = document.getElementById('semesterGrid');
  grid.innerHTML = '';
  
  const semesters = [...new Set(COURSES.map(c => c.semester))];

  semesters.forEach(sem => {
    const visible = COURSES.filter(c => 
      activeTopic === "" || c.topics.includes(activeTopic)
    ).filter(c => c.semester === sem);

    if (visible.length === 0) return;

    const block = document.createElement('div');
    block.className = 'semester-block';
    block.innerHTML = `
      <div class="semester-header"><span class="semester-label">${sem}</span><div class="semester-line"></div></div>
      <div class="course-row"></div>
    `;

    const row = block.querySelector('.course-row');
    visible.forEach(c => {
      const card = document.createElement('div');
      card.className = 'course-card';
      card.style.borderTopColor = CATEGORIES[c.cat].color;
      
      card.innerHTML = `
        <div class="course-code">${c.code}</div>
        <div class="course-name">${c.name}</div>
        <div class="topic-tag-list">
          ${c.topics.map(t => `<span class="topic-tag" onclick="event.stopPropagation(); filterByTopic('${t}')">${t}</span>`).join('')}
        </div>
      `;
      card.onclick = () => openModal(c);
      row.appendChild(card);
    });
    grid.appendChild(block);
  });
}

function openModal(c) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-header">
      <div class="course-code">${c.code}</div>
      <h2>${c.name}</h2>
    </div>
    <p>${c.desc}</p>
    <div class="section-title">Topic Mapping</div>
    <div class="topic-tag-list">
      ${c.topics.map(t => `<span class="topic-tag" style="font-size:12px; padding:6px 12px;" onclick="closeModal(); filterByTopic('${t}')">${t}</span>`).join('')}
    </div>
  `;
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

init();
</script>
</body>
</html>
